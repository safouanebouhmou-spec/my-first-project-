<!DOCTYPE html>
<html>
<head>

  <title>Game Card</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-blue-200 p-10 rounded-2xl shadow-lg flex justify-center items-center ">

  <div class="w-96 bg-yellow-200 p-4 rounded-2xl shadow-xl">

    <img
      src="https://static0.gamerantimages.com/wordpress/wp-content/uploads/2025/02/minecraft-key-art-feature.jpg"
      class="w-full h-48 object-cover rounded-2xl shadow-xl">

    <h1 class="text-2xl mt-4 rounded-2xl bg-blue-50 shadow-lg">
      Minecraft
    </h1>

    <p class="mt-2">
      Build amazing worlds and explore new adventures.
    </p>

    <button
      id="likeBtn"
      class="mt-4 bg-red-500 text-white px-4 py-2 rounded-2xl">
      Like ❤️
    </button>

    <p id="counter" class="mt-2">
      Likes: 0
    </p>

  </div>

  <script>
    let likes = 0;

    document.getElementById("likeBtn").onclick = function () {
      likes++;
      document.getElementById("counter").innerText =
        "Likes: " + likes;
    };
  </script>

</body>
</html>
